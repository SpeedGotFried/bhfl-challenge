<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Graph Processor</title>
    <!-- Include vis-network for graph rendering -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BFHL Graph Processor</h1>
        
        <div class="input-section glass-card">
            <label for="data-input">Enter Node Array (JSON format):</label>
            <textarea id="data-input" rows="5">["A->B", "A->C", "B->D", "C->E", "E->F", "X->Y", "Y->Z", "Z->X", "P->Q", "Q->R", "G->H", "G->H", "G->I", "hello", "1->2", "A->"]</textarea>
            <button id="submit-btn">Process Graph</button>
        </div>

        <div id="error-message" class="error hidden"></div>

        <div id="results-section" class="results-section hidden">
            <div class="results-grid">
                <div class="user-details glass-card card">
                    <h3>User Details</h3>
                    <p><strong>ID:</strong> <span id="res-user-id"></span></p>
                    <p><strong>Email:</strong> <span id="res-email"></span></p>
                    <p><strong>Roll Number:</strong> <span id="res-roll"></span></p>
                </div>

                <div class="summary glass-card card">
                    <h3>Summary</h3>
                    <p><strong>Total Valid Trees:</strong> <span id="res-total-trees"></span></p>
                    <p><strong>Total Cycles:</strong> <span id="res-total-cycles"></span></p>
                    <p><strong>Largest Tree Root:</strong> <span id="res-largest-root"></span></p>
                </div>

                <div class="issues glass-card card full-width">
                    <h3>Issues</h3>
                    <p><strong>Invalid Entries:</strong> <span id="res-invalid"></span></p>
                    <p><strong>Duplicate Edges:</strong> <span id="res-duplicates"></span></p>
                </div>

                <div class="graph-view glass-card card full-width">
                    <h3>Interactive Graph Visualization</h3>
                    <p>Drag nodes to explore the parsed trees.</p>
                    <div id="graph-container"></div>
                </div>

                <div class="hierarchies glass-card card full-width">
                    <h3>Raw Hierarchies JSON</h3>
                    <pre id="res-hierarchies"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Store network instance globally so we can destroy it on re-render
        let network = null;

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const inputVal = document.getElementById('data-input').value;
            const errorDiv = document.getElementById('error-message');
            const resultsSection = document.getElementById('results-section');
            
            errorDiv.classList.add('hidden');
            resultsSection.classList.add('hidden');
            
            let parsedData;
            try {
                parsedData = JSON.parse(inputVal);
                if (!Array.isArray(parsedData)) {
                    throw new Error("Input must be a JSON array of strings.");
                }
            } catch (e) {
                errorDiv.textContent = "Invalid JSON format. Please provide an array like [\"A->B\", \"C->D\"]";
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/bfhl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: parsedData })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    // Handle Zod or server errors cleanly
                    const msg = data.error || "API call failed";
                    const details = data.details ? JSON.stringify(data.details) : "";
                    throw new Error(`${msg} ${details}`);
                }
                
                document.getElementById('res-user-id').textContent = data.user_id;
                document.getElementById('res-email').textContent = data.email_id;
                document.getElementById('res-roll').textContent = data.college_roll_number;
                
                document.getElementById('res-total-trees').textContent = data.summary.total_trees;
                document.getElementById('res-total-cycles').textContent = data.summary.total_cycles;
                document.getElementById('res-largest-root').textContent = data.summary.largest_tree_root || "N/A";
                
                document.getElementById('res-invalid').textContent = data.invalid_entries.length > 0 ? data.invalid_entries.join(', ') : "None";
                document.getElementById('res-duplicates').textContent = data.duplicate_edges.length > 0 ? data.duplicate_edges.join(', ') : "None";
                
                document.getElementById('res-hierarchies').textContent = JSON.stringify(data.hierarchies, null, 2);
                
                // Draw Visual Graph
                drawGraph(data.hierarchies);

                resultsSection.classList.remove('hidden');
            } catch (e) {
                errorDiv.textContent = "Error: " + e.message;
                errorDiv.classList.remove('hidden');
            }
        });

        function drawGraph(hierarchies) {
            const nodesMap = new Map();
            const edges = [];

            // Recursive function to parse API tree object
            function traverseTree(nodeId, childrenObj, isRoot = false) {
                if (!nodesMap.has(nodeId)) {
                    nodesMap.set(nodeId, { 
                        id: nodeId, 
                        label: nodeId, 
                        color: isRoot ? '#3b82f6' : '#10b981', 
                        font: { color: 'white', face: 'Inter' },
                        shape: 'circle',
                        shadow: true
                    });
                }
                
                for (const childId in childrenObj) {
                    if (!nodesMap.has(childId)) {
                        nodesMap.set(childId, { 
                            id: childId, 
                            label: childId, 
                            color: '#10b981', 
                            font: { color: 'white', face: 'Inter' },
                            shape: 'circle',
                            shadow: true
                        });
                    }
                    edges.push({ 
                        from: nodeId, 
                        to: childId, 
                        arrows: 'to',
                        color: { color: 'rgba(255,255,255,0.2)', highlight: '#3b82f6' }
                    });
                    
                    // Recurse
                    traverseTree(childId, childrenObj[childId], false);
                }
            }

            hierarchies.forEach(h => {
                if (h.has_cycle) {
                    // Cycles don't return full trees in the API, just mark the root
                    nodesMap.set(h.root, { 
                        id: h.root, 
                        label: h.root + ' (Cycle)', 
                        color: '#ef4444', 
                        font: { color: 'white', face: 'Inter' },
                        shape: 'circle',
                        shadow: true
                    });
                } else {
                    // Pass the root's children object
                    traverseTree(h.root, h.tree[h.root] || {}, true);
                }
            });

            const container = document.getElementById('graph-container');
            const data = {
                nodes: new vis.DataSet(Array.from(nodesMap.values())),
                edges: new vis.DataSet(edges)
            };
            
            const options = {
                physics: {
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: { gravitationalConstant: -50 }
                },
                interaction: { hover: true }
            };

            if (network !== null) {
                network.destroy();
            }
            network = new vis.Network(container, data, options);
        }
    </script>
</body>
</html>
